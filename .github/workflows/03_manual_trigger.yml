name: Spin

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    spin:
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest

        environment:
            name: prod

        steps:
            - uses: actions/checkout@v4

            - name: Print Greeting
              run: |
                echo "Hello, Spin!"
                date
                pwd
                ls -la