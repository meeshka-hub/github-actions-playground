name: Hello

on: 
  workflow_run:
    workflows: 'Spin'
    branches:
        - main
    types:
        - completed

jobs:
  hello:
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v4

      - name: Print Greeting
        run: |
          echo "Hello, Github Actions!"
          date
          pwd
          ls -la