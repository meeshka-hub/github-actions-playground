name: Spin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  spin:
    runs-on: ubuntu-latest
    environment:
      name: casino
      url: https://github.com

    steps:
      - uses: actions/checkout@v4

      - name: Start Machine
        run: |
          echo "The machine is armed..."
          echo "## 🎰 Deployment Casino" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Welcome and good luck!" >> "$GITHUB_STEP_SUMMARY"

  reel_1:
    needs: spin
    if: always()
    runs-on: ubuntu-latest
    outputs:
      symbol: ${{ steps.roll.outputs.symbol }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - id: roll
        run: |
          sleep 3
          python scripts/reel_spin.py > reel_output.txt
          SYMBOL=$(tail -n 1 reel_output.txt | sed 's/^symbol=//')
          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "### 🎲 Reel 1" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: $SYMBOL" >> "$GITHUB_STEP_SUMMARY"

  reel_2:
    needs: reel_1
    if: always()
    runs-on: ubuntu-latest
    outputs:
      symbol: ${{ steps.roll.outputs.symbol }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - id: roll
        run: |
          sleep 5
          python scripts/reel_spin.py > reel_output.txt
          SYMBOL=$(tail -n 1 reel_output.txt | sed 's/^symbol=//')
          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "### 🎲 Reel 2" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: $SYMBOL" >> "$GITHUB_STEP_SUMMARY"

  reel_3:
    needs: reel_2
    if: always()
    runs-on: ubuntu-latest
    outputs:
      symbol: ${{ steps.roll.outputs.symbol }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - id: roll
        run: |
          sleep 7
          python scripts/reel_spin.py > reel_output.txt
          SYMBOL=$(tail -n 1 reel_output.txt | sed 's/^symbol=//')
          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "### 🎲 Reel 3" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: $SYMBOL" >> "$GITHUB_STEP_SUMMARY"

  jackpot:
    needs:
      - spin
      - reel_1
      - reel_2
      - reel_3
    runs-on: ubuntu-latest
    steps:
      - name: Check payout
        run: |
          R1="${{ needs.reel_1.outputs.symbol }}"
          R2="${{ needs.reel_2.outputs.symbol }}"
          R3="${{ needs.reel_3.outputs.symbol }}"

          {
            echo ""
            echo "## 🎰 Final Spin"
            echo ""
            echo "| Reel 1 | Reel 2 | Reel 3 |"
            echo "|---|---|---|"
            echo "| $R1 | $R2 | $R3 |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ \
            "$R1" = "7️⃣" \
            ] && [ \
            "$R2" = "7️⃣" \
            ] && [ \
            "$R3" = "7️⃣" \
            ]; then
              echo "# 🎰 JACKPOT - DEPLOYING" >> "$GITHUB_STEP_SUMMARY"
          else
              echo "# 💀 No jackpot. Try again!" >> "$GITHUB_STEP_SUMMARY"
              exit 1
          fi

  deploy:
    needs: jackpot
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
