name: Spin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  spin:
    runs-on: ubuntu-latest
    environment:
      name: casino
      url: https://github.com

    steps:
      - uses: actions/checkout@v4

      - name: Start Machine
        run: |
          echo "The machine is armed..."
          echo "## 🎰 Deployment Casino" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Waiting for the reels..." >> "$GITHUB_STEP_SUMMARY"

  reel_1:
    needs: spin
    if: always()
    runs-on: ubuntu-latest
    outputs:
      symbol: ${{ steps.roll.outputs.symbol }}

    steps:
      - id: roll
        run: |
          sleep 3

          symbols=("🍒" "🍋" "🔔" "⭐" "💎" "7️⃣")
          weights=(57 25 10 5 2 1)

          roll=$(( RANDOM % 100 ))

          if [ $roll -lt 57 ]; then
            symbol="🍒"
          elif [ $roll -lt 82 ]; then
            symbol="🍋"
          elif [ $roll -lt 92 ]; then
            symbol="🔔"
          elif [ $roll -lt 97 ]; then
            symbol="⭐"
          elif [ $roll -lt 99 ]; then
            symbol="💎"
          else
            symbol="7️⃣"
          fi

          echo "symbol=$symbol" >> "$GITHUB_OUTPUT"
          echo "🎰 Reel 1 landed on $symbol"

  reel_2:
    needs: reel_1
    if: always()
    runs-on: ubuntu-latest
    outputs:
      symbol: ${{ steps.roll.outputs.symbol }}

    steps:
      - id: roll
        run: |
          sleep 5

          symbols=("🍒" "🍋" "🔔" "⭐" "💎" "7️⃣")
          weights=(57 25 10 5 2 1)

          roll=$(( RANDOM % 100 ))

          if [ $roll -lt 57 ]; then
            symbol="🍒"
          elif [ $roll -lt 82 ]; then
            symbol="🍋"
          elif [ $roll -lt 92 ]; then
            symbol="🔔"
          elif [ $roll -lt 97 ]; then
            symbol="⭐"
          elif [ $roll -lt 99 ]; then
            symbol="💎"
          else
            symbol="7️⃣"
          fi

          echo "symbol=$symbol" >> "$GITHUB_OUTPUT"
          echo "🎰 Reel 2 landed on $symbol"

  reel_3:
    needs: reel_2
    if: always()
    runs-on: ubuntu-latest
    outputs:
      symbol: ${{ steps.roll.outputs.symbol }}

    steps:
      - id: roll
        run: |
          sleep 7

          symbols=("🍒" "🍋" "🔔" "⭐" "💎" "7️⃣")
          weights=(57 25 10 5 2 1)

          roll=$(( RANDOM % 100 ))

          if [ $roll -lt 57 ]; then
            symbol="🍒"
          elif [ $roll -lt 82 ]; then
            symbol="🍋"
          elif [ $roll -lt 92 ]; then
            symbol="🔔"
          elif [ $roll -lt 97 ]; then
            symbol="⭐"
          elif [ $roll -lt 99 ]; then
            symbol="💎"
          else
            symbol="7️⃣"
          fi

          echo "symbol=$symbol" >> "$GITHUB_OUTPUT"
          echo "🎰 Reel 3 landed on $symbol"

  jackpot:
    needs:
      - spin
      - reel_1
      - reel_2
      - reel_3
    runs-on: ubuntu-latest
    steps:
      - name: Check payout
        run: |
          R1="${{ needs.reel_1.outputs.symbol }}"
          R2="${{ needs.reel_2.outputs.symbol }}"
          R3="${{ needs.reel_3.outputs.symbol }}"

          {
            echo ""
            echo "## 🎰 Final Spin"
            echo ""
            echo "| Reel 1 | Reel 2 | Reel 3 |"
            echo "|---|---|---|"
            echo "| $R1 | $R2 | $R3 |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ \
            "$R1" = "7️⃣" \
            ] && [ \
            "$R2" = "7️⃣" \
            ] && [ \
            "$R3" = "7️⃣" \
            ]; then
              echo "🎰 JACKPOT - DEPLOYING"
          else
              echo "💀 No jackpot"
              exit 1
          fi

  deploy:
    needs: jackpot
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
